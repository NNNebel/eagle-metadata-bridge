name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout eagle-metadata-bridge
        uses: actions/checkout@v4

      # Check out comfyui-auto-tagger to use JS-parser expected values as
      # the source of truth for core field comparison tests.
      - name: Checkout comfyui-auto-tagger (JS expected source of truth)
        uses: actions/checkout@v4
        with:
          repository: NNNebel/comfyui-auto-tagger
          path: comfyui-auto-tagger

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r requirements.txt

      - name: Run tests
        env:
          COMFYUI_AUTO_TAGGER_PATH: ${{ github.workspace }}/comfyui-auto-tagger
        run: python -m pytest tests/ -v
